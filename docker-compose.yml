version: '3.8'

services:
  # Ollama - AI Model Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve
    networks:
      - rag-network

  # Backend API - FastAPI Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_MODEL=mistral
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_DB_DIR=./chroma_db
      - KB_DIR=./knowledge_base
      - API_PORT=8000
      - DEBUG=false
    volumes:
      - ./backend:/app
      - backend_data:/app/chroma_db
      - kb_data:/app/knowledge_base
    depends_on:
      - ollama
    networks:
      - rag-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend - React Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - rag-network
    command: npm start

volumes:
  ollama_data:
  backend_data:
  kb_data:

networks:
  rag-network:
    driver: bridge
